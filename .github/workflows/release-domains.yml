name: Release Domain Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-domains:
    strategy:
      matrix:
        domain:
          - bootstrap
          - keyboard
          - connect
          - container
          - cron
          - defaults
          - dotfiles
          - files
          - git
          - projects
          - scheduler
          - worktree

    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release -p mac-domain-${{ matrix.domain }} --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release -p mac-domain-${{ matrix.domain }} --target x86_64-apple-darwin

      - name: Package
        run: |
          tar czf mac-domain-${{ matrix.domain }}-aarch64-apple-darwin.tar.gz \
            -C target/aarch64-apple-darwin/release mac-domain-${{ matrix.domain }}
          tar czf mac-domain-${{ matrix.domain }}-x86_64-apple-darwin.tar.gz \
            -C target/x86_64-apple-darwin/release mac-domain-${{ matrix.domain }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-domain-${{ matrix.domain }}-aarch64-apple-darwin.tar.gz
            mac-domain-${{ matrix.domain }}-x86_64-apple-darwin.tar.gz

  build-manager-and-tui:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build manager
        run: |
          cargo build --release -p mac-domain-manager --target aarch64-apple-darwin
          cargo build --release -p mac-domain-manager --target x86_64-apple-darwin

      - name: Build TUI
        run: |
          cargo build --release -p mac-host-tui --target aarch64-apple-darwin
          cargo build --release -p mac-host-tui --target x86_64-apple-darwin

      - name: Package
        run: |
          tar czf mac-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release mac
          tar czf mac-x86_64-apple-darwin.tar.gz -C target/x86_64-apple-darwin/release mac
          tar czf mac-host-tui-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release mac-host-tui
          tar czf mac-host-tui-x86_64-apple-darwin.tar.gz -C target/x86_64-apple-darwin/release mac-host-tui

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-aarch64-apple-darwin.tar.gz
            mac-x86_64-apple-darwin.tar.gz
            mac-host-tui-aarch64-apple-darwin.tar.gz
            mac-host-tui-x86_64-apple-darwin.tar.gz
