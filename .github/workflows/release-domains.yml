name: Release Domain Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        domain:
          - keyboard
          - brew
          - cron
          - defaults
          - dotfiles
          - files
          - projects
          - worktree
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build domain binary
        run: |
          cargo build --release -p mac-domain-${{ matrix.domain }} --target ${{ matrix.target }}

      - name: Package
        run: |
          BINARY=target/${{ matrix.target }}/release/mac-domain-${{ matrix.domain }}
          ASSET=mac-domain-${{ matrix.domain }}-${{ matrix.target }}.tar.gz
          tar czf $ASSET -C target/${{ matrix.target }}/release mac-domain-${{ matrix.domain }}
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  build-manager:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build manager
        run: |
          cargo build --release -p mac-domain-manager --target ${{ matrix.target }}

      - name: Package
        run: |
          ASSET=mac-${{ matrix.target }}.tar.gz
          tar czf $ASSET -C target/${{ matrix.target }}/release mac
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  build-tui:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build TUI
        run: |
          cargo build --release -p mac-host-tui --target ${{ matrix.target }}

      - name: Package
        run: |
          ASSET=mac-host-tui-${{ matrix.target }}.tar.gz
          tar czf $ASSET -C target/${{ matrix.target }}/release mac-host-tui
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
